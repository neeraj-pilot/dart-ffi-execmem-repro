name: GitHub Pages

on:
  pull_request:
    paths:
      - 'site/**'
      - 'pa11y.json'
      - '.github/workflows/pages.yml'
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'pa11y.json'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 22.22.0

      - name: Verify the tested snapshot exists
        run: git ls-remote --exit-code --tags origin refs/tags/v0.1.0

      - name: Validate HTML
        run: npx --yes html-validate@11.5.5 site/index.html

      - name: Check WCAG 2 AA
        run: |
          python3 -m http.server 4173 --directory site >/tmp/repro-site.log 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid"' EXIT
          for attempt in {1..20}; do
            if curl --fail --silent http://127.0.0.1:4173/ >/dev/null; then
              break
            fi
            sleep 1
          done
          npx --yes pa11y@9.1.1 --standard WCAG2AA http://127.0.0.1:4173/

  deploy:
    if: github.event_name != 'pull_request'
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

      - name: Upload site
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5

      - name: Verify public page
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          for attempt in {1..20}; do
            if curl --fail --silent --show-error "$PAGE_URL" | grep --quiet "Why a Flutter AOT app"; then
              exit 0
            fi
            sleep 3
          done
          exit 1
